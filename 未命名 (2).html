<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>静息白噪音 - 首页</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
}
body{
  color: #33383c;
  padding-bottom: 95px;
  overflow-x: hidden;
}
/* 底层渐变动态背景 */
.base-bg{
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -2;
  background: linear-gradient(-45deg, #e6f0f7, #d7e9d2, #f6efe4, #dbeaf5);
  background-size: 400% 400%;
  animation: gradientFlow 18s ease infinite;
}
@keyframes gradientFlow{
  0%{background-position: 0% 50%;}
  50%{background-position: 100% 50%;}
  100%{background-position: 0% 50%;}
}
/* 播放音效全屏实景背景 */
.play-bg{
  position: fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  z-index:-1;
  background-size: cover;
  background-position: center;
  opacity:0;
  transition: opacity 1s ease;
  background-attachment: fixed;
}
.play-bg.active{
  opacity: 0.35;
}
.container{
  max-width:720px;
  margin:0 auto;
  padding:0 16px;
  position:relative;
}
.top-bar{
  height:78px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo-text{
  font-size:20px;
  font-weight:500;
  color:#2c3840;
}
.icon-group{
  display:flex;
  gap:22px;
}
.svg-icon{
  width:24px;height:24px;
  opacity:0.8;
}
.desc-wrap{
  text-align:center;
  margin:12px 0 28px;
}
.main-slogan{
  font-size:22px;
  margin-bottom:6px;
}
.sub-tip{
  font-size:13px;
  color:#555;
}
/* 横向场景卡片 */
.scene-scroll{
  overflow-x:auto;
  display:flex;
  gap:14px;
  padding-bottom:8px;
  margin-bottom:28px;
}
.scene-scroll::-webkit-scrollbar{height:3px;}
.scene-card{
  flex-shrink:0;
  width:250px;height:175px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  box-shadow:0 3px 14px rgba(0,0,0,0.15);
  cursor:pointer;
}
.scene-card img{
  width:100%;height:100%;
  object-fit:cover;
}
.scene-mask{
  position:absolute;
  left:0;bottom:0;
  width:100%;padding:16px;
  background:linear-gradient(transparent, rgba(0,0,0,0.5));
  color:#fff;
}
.scene-title{font-size:17px;margin-bottom:3px;}
.scene-desc{font-size:12px;opacity:0.9;}

/* 播放器磨砂面板 */
.player-wrap{
  background:rgba(255,255,255,0.58);
  backdrop-filter:blur(10px);
  border-radius:24px;
  padding:36px 20px;
  text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
/* 居中圆形播放按钮 */
.play-circle{
  width:160px;height:160px;
  margin:0 auto 22px;
  border-radius:50%;
  background:#94bfa8;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  animation: breathe 4.5s ease-in-out infinite alternate;
}
@keyframes breathe{
  0%{transform:scale(0.95);}
  100%{transform:scale(1.04);}
}
.play-svg{
  width:42px;
  fill:#fff;
}
.current-name{
  font-size:14px;
  color:#444;
  margin-bottom:24px;
}
/* 音量滑块 */
.vol-box{
  text-align:left;
  margin-bottom:26px;
}
.vol-label{
  font-size:13px;color:#444;margin-bottom:8px;
}
input[type="range"]{
  width:100%;
  height:6px;
  background:#d9e2e8;
  border-radius:99px;
  outline:none;
  -webkit-appearance:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:16px;height:16px;
  border-radius:50%;
  background:#689e84;
}
/* 混音列表 默认空白 */
.mix-list{
  text-align:left;
  margin-bottom:28px;
  min-height: 42px;
}
.mix-empty-tip{
  text-align:center;
  color:#666;
  font-size:13px;
  padding:10px 0;
}
.mix-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(0,0,0,0.08);
}
.mix-name{
  display:flex;
  gap:10px;
  font-size:14px;
}
.slider-sm{
  width:90px !important;
}
.func-row{
  display:flex;
  justify-content:space-around;
  margin-bottom:28px;
}
.func-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  font-size:12px;color:#444;
}
.main-btn{
  width:220px;height:56px;
  border-radius:99px;
  border:none;
  background:#689e84;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
/* 底部Tab导航 */
.tab-bar{
  position:fixed;
  bottom:0;left:0;
  width:100%;height:82px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  display:flex;
  border-top:1px solid rgba(0,0,0,0.06);
}
.tab-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:12px;color:#666;
  text-decoration:none;
}
.tab-item.active{
  color:#689e84;
}
</style>
</head>
<body>
<div class="base-bg"></div>
<div class="play-bg" id="fullPlayBg"></div>

<div class="container">
  <div class="top-bar">
    <div class="logo-text">静息白噪音</div>
    <div class="icon-group">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#33383c" stroke-width="1.4">
        <path d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35"/>
      </svg>
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#33383c" stroke-width="1.4">
        <path d="M12 20.8l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 10.98L12 20.8z"/>
      </svg>
    </div>
  </div>

  <div class="desc-wrap">
    <div class="main-slogan">轻音降噪，专注安睡</div>
    <div class="sub-tip">点击场景切换音效，双播放按钮同步控制全屏背景</div>
  </div>

  <div class="scene-scroll">
    <div class="scene-card" data-audio="林间微风树叶声" data-bgimg="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600">
      <img alt="林间放松" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&auto=format&fit=crop">
      <div class="scene-mask">
        <div class="scene-title">林间放松</div>
        <div class="scene-desc">溪流、微风鸟鸣</div>
      </div>
    </div>
    <div class="scene-card" data-audio="咖啡馆背景人声" data-bgimg="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=1600">
      <img alt="自习咖啡馆" src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=500&auto=format&fit=crop">
      <div class="scene-mask">
        <div class="scene-title">自习专注</div>
        <div class="scene-desc">咖啡馆、翻书雨声</div>
      </div>
    </div>
    <div class="scene-card" data-audio="窗边雷雨" data-bgimg="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600">
      <img alt="雨夜窗边" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500&auto=format&fit=crop">
      <div class="scene-mask">
        <div class="scene-title">深夜助眠</div>
        <div class="scene-desc">雨夜、篝火、海浪</div>
      </div>
    </div>
  </div>

  <div class="player-wrap">
    <div class="play-circle" id="circlePlay">
      <svg class="play-svg" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
    <div class="current-name" id="audioTitle">未选择音效</div>

    <div class="vol-box">
      <div class="vol-label">总音量</div>
      <input type="range" value="60">
    </div>

    <div class="mix-list" id="mixContainer">
      <div class="mix-empty-tip">点击上方场景卡片选择音效</div>
    </div>

    <div class="func-row">
      <div class="func-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.4">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l4 2"/>
        </svg>
        <span>定时</span>
      </div>
      <div class="func-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.4">
          <path d="M12 2v20M2 12h20"/>
        </svg>
        <span>随机声场</span>
      </div>
      <div class="func-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.4">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span>收藏混音</span>
      </div>
      <div class="func-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.4">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
        <span>渐弱关闭</span>
      </div>
    </div>

    <button class="main-btn" id="playBtn">开始播放</button>
  </div>
</div>

<div class="tab-bar">
  <a class="tab-item active" href="index.html">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#689e84">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <span>首页</span>
  </a>
  <a class="tab-item" href="audio.html">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.4">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
    </svg>
    <span>音效库</span>
  </a>
  <a class="tab-item" href="focus.html">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.4">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
    </svg>
    <span>专注钟</span>
  </a>
  <a class="tab-item" href="mine.html">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.4">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span>我的</span>
  </a>
</div>

<script>
const fullPlayBg = document.getElementById('fullPlayBg');
const circlePlay = document.getElementById('circlePlay');
const playBtn = document.getElementById('playBtn');
const audioTitle = document.getElementById('audioTitle');
const mixContainer = document.getElementById('mixContainer');

let isPlaying = false;
let selectAudioName = "";
let selectBgUrl = "";

document.querySelectorAll('.scene-card').forEach(card => {
  card.onclick = function(){
    selectAudioName = this.dataset.audio;
    selectBgUrl = this.dataset.bgimg;
    audioTitle.innerText = `当前音效：${selectAudioName}`;
    mixContainer.innerHTML = `
      <div class="mix-item">
        <div class="mix-name">🍃 ${selectAudioName}</div>
        <input class="slider-sm" type="range" value="60">
      </div>
    `;
    fullPlayBg.style.backgroundImage = `url(${selectBgUrl})`;
    if(isPlaying) fullPlayBg.classList.add('active');
  }
})

function togglePlayStatus(){
  if(!selectAudioName){
    alert("请先选择上方场景音效");
    return;
  }
  isPlaying = !isPlaying;
  if(isPlaying){
    playBtn.innerText = "暂停播放";
    circlePlay.querySelector('svg').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    fullPlayBg.classList.add('active');
  }else{
    playBtn.innerText = "开始播放";
    circlePlay.querySelector('svg').innerHTML = '<path d="M8 5v14l11-7z"/>';
    fullPlayBg.classList.remove('active');
  }
}
circlePlay.onclick = togglePlayStatus;
playBtn.onclick = togglePlayStatus;
</script>
</body>
</html>
